<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crackerbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Satisfy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3"/>
</head>
<body>

  <div class="grain"></div>

  <!-- INTRO SCREEN -->
  <div id="intro-screen">
    <div class="intro-inner">
      <div class="intro-logo">Welcome to Crackerbox</div>
      <div class="intro-bar"><div class="intro-bar-fill"></div></div>
    </div>
  </div>

  <!-- READING PROGRESS -->
  <div id="reading-progress"></div>

  <!-- HEADER -->
  <header id="site-header">
    <div class="header-inner">
      <a href="#" class="site-title" id="site-title-btn">Crackerbox</a>
      <nav id="main-nav">
        <a href="#" onclick="navigate('stories')" data-page="stories">Stories</a>
        <a href="#" onclick="navigate('essays')"  data-page="essays">Essays</a>
        <a href="#" onclick="navigate('music')"   data-page="music">Music</a>
        <a href="#" onclick="navigate('about')"   data-page="about">About</a>
        <button id="admin-btn" onclick="toggleAdminPanel()" style="display:none">⚙</button>
      </nav>
    </div>
    <div class="header-rule"></div>
  </header>

  <main id="app">

    <!-- HOME -->
    <section id="page-home" class="page active">
      <div class="carousel-wrap" id="carousel-wrap">
        <div class="carousel-track" id="carousel-track"></div>
        <button class="carousel-btn prev" onclick="carouselMove(-1)">&#8249;</button>
        <button class="carousel-btn next" onclick="carouselMove(1)">&#8250;</button>
        <div class="carousel-dots" id="carousel-dots"></div>
      </div>
      <div class="home-section-label">Recent</div>
      <div class="thumb-grid" id="home-recent"></div>
    </section>

    <!-- STORIES -->
    <section id="page-stories" class="page">
      <div class="page-header">
        <span class="page-label">Fiction</span>
        <h2 class="page-title">Stories</h2>
      </div>
      <div class="thumb-grid padded" id="list-stories"></div>
    </section>

    <!-- ESSAYS -->
    <section id="page-essays" class="page">
      <div class="page-header">
        <span class="page-label">Non-Fiction</span>
        <h2 class="page-title">Essays</h2>
      </div>
      <div class="thumb-grid padded" id="list-essays"></div>
    </section>

    <!-- MUSIC -->
    <section id="page-music" class="page">
      <div class="page-header">
        <span class="page-label">Sound</span>
        <h2 class="page-title">Music</h2>
      </div>
      <div class="music-tabs">
        <button class="music-tab active" onclick="switchMusicTab('posts', this)">Write-ups</button>
        <button class="music-tab" onclick="switchMusicTab('songs', this)">Songs &amp; Chords</button>
        <button class="music-tab" onclick="switchMusicTab('links', this)">Streaming</button>
      </div>
      <div id="music-tab-posts" class="music-tab-panel active">
        <div class="thumb-grid padded" id="list-music"></div>
      </div>
      <div id="music-tab-songs" class="music-tab-panel">
        <div class="song-list" id="list-songs"></div>
      </div>
      <div id="music-tab-links" class="music-tab-panel">
        <div class="streaming-placeholder">
          <p>Streaming links coming soon.</p>
        </div>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="page-about" class="page">
      <div class="page-header">
        <span class="page-label">Who</span>
        <h2 class="page-title">About</h2>
      </div>
      <div class="about-body" id="about-body">
        <p>This is the about page. Log in as admin to edit it.</p>
      </div>
    </section>

    <!-- SINGLE POST -->
    <section id="page-post" class="page">
      <div id="post-banner"></div>
      <div class="post-wrap">
        <button class="back-btn" onclick="goBack()">&#8592; Back</button>
        <div id="single-post-content"></div>
        <div id="comments-section"></div>
      </div>
    </section>

  </main>

  <!-- ADMIN OVERLAY -->
  <div id="admin-overlay" class="overlay hidden">
    <div class="overlay-box">
      <button class="close-btn" onclick="closeOverlay('admin-overlay')">&#10005;</button>
      <h3 class="overlay-title">Admin Panel</h3>
      <div class="admin-actions">
        <button class="btn-action" onclick="openNewPost()">+ New Post</button>
        <button class="btn-action" onclick="openEditAbout()">Edit About</button>
        <button class="btn-action btn-logout" onclick="logout()">Log Out</button>
      </div>
      <div id="admin-posts-list"></div>
    </div>
  </div>

  <!-- LOGIN OVERLAY -->
  <div id="login-overlay" class="overlay hidden">
    <div class="overlay-box small">
      <button class="close-btn" onclick="closeOverlay('login-overlay')">&#10005;</button>
      <h3 class="overlay-title">Admin Login</h3>
      <div class="form-group">
        <input type="email"    id="login-email"    placeholder="Email"    class="field"/>
        <input type="password" id="login-password" placeholder="Password" class="field"/>
        <div id="login-error" class="error-msg"></div>
        <button class="btn-submit" onclick="login()">Enter</button>
      </div>
    </div>
  </div>

  <!-- POST EDITOR OVERLAY -->
  <div id="post-overlay" class="overlay hidden">
    <div class="overlay-box large">
      <button class="close-btn" onclick="closeOverlay('post-overlay')">&#10005;</button>
      <h3 class="overlay-title" id="post-overlay-title">New Post</h3>
      <div class="form-group">
        <input type="text" id="post-title"    placeholder="Title"               class="field"/>
        <input type="text" id="post-subtitle" placeholder="Subtitle (optional)" class="field"/>
        <input type="date" id="post-published-at" class="field" title="Published date"/>
        <select id="post-category" class="field">
          <option value="stories">Stories</option>
          <option value="essays">Essays</option>
          <option value="music">Music</option>
        </select>

        <div class="image-input-group">
          <label class="field-label">Thumbnail</label>
          <input type="text" id="post-thumbnail-url" placeholder="Paste image URL…" class="field"/>
          <div class="or-divider">or upload</div>
          <input type="file" id="post-thumbnail-file" accept="image/*" class="field file-input"/>
          <div id="thumb-preview" class="img-preview"></div>
        </div>

        <div class="image-input-group">
          <label class="field-label">Banner image (top of post — leave blank to use thumbnail)</label>
          <input type="text" id="post-cover-url" placeholder="Paste image URL…" class="field"/>
          <div class="or-divider">or upload</div>
          <input type="file" id="post-cover-file" accept="image/*" class="field file-input"/>
          <div id="cover-preview" class="img-preview"></div>
        </div>

        <textarea id="post-body" class="field textarea" placeholder="Write here. Markdown: **bold** *italic* ## heading > quote --- divider. Inline image: ![alt](url)"></textarea>
        <div id="post-error" class="error-msg"></div>
        <div class="form-row">
          <button class="btn-submit" onclick="savePost()">Publish</button>
          <button id="delete-post-btn" class="btn-delete hidden" onclick="deletePost()">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ABOUT EDITOR -->
  <div id="about-overlay" class="overlay hidden">
    <div class="overlay-box large">
      <button class="close-btn" onclick="closeOverlay('about-overlay')">&#10005;</button>
      <h3 class="overlay-title">Edit About</h3>
      <div class="form-group">
        <textarea id="about-edit-body" class="field textarea"></textarea>
        <button class="btn-submit" onclick="saveAbout()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let titleClicks = 0;
    document.getElementById('site-title-btn').addEventListener('click', e => {
      e.preventDefault();
      titleClicks++;
      if (titleClicks >= 5) { titleClicks = 0; showOverlay('login-overlay'); }
      else navigate('home');
    });
  </script>

  <script src="supabase.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
